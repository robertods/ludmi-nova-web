<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Ludmi Nova</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: #f6dce9;
      font-family: Arial, Helvetica, sans-serif;
      color: #ffffff;
    }

    main {
      position: relative;
      width: 100%;
      max-width: 1100px;
      height: min(760px, calc(100vh - 48px));
      min-height: 520px;
      overflow: hidden;
      border-radius: 28px;
      background-image: url("ludminova.jpg");
      background-position: center;
      background-size: cover;
      box-shadow: 0 24px 70px rgba(70, 25, 52, 0.25);
    }

    main::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(
          to top,
          rgba(20, 8, 16, 0.72),
          rgba(20, 8, 16, 0.08) 55%,
          rgba(20, 8, 16, 0.05)
        );
    }

    .content {
      position: absolute;
      z-index: 1;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 48px;
      text-align: center;
    }

    h1 {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(46px, 8vw, 92px);
      font-weight: normal;
      line-height: 1;
      text-shadow: 0 4px 24px rgba(0, 0, 0, 0.35);
    }

    p {
      margin: 20px 0 0;
      font-size: clamp(15px, 2vw, 20px);
      letter-spacing: 5px;
      text-transform: uppercase;
      text-shadow: 0 3px 16px rgba(0, 0, 0, 0.5);
    }

    @media (max-width: 600px) {
      body {
        padding: 0;
      }

      main {
        height: 100vh;
        min-height: 100vh;
        border-radius: 0;
      }

      .content {
        padding: 38px 24px;
      }
    }
  </style>
</head>

<body>
  <main>
    <div class="content">
      <h1>Ludmi Nova</h1>
      <p>Sitio en construcción</p>
    </div>
  </main>
</body>
</html>
